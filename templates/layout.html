<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else if (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>

<body>
  <header class="site-header sticky-top">
    <div class="d-flex align-items-center justify-content-between py-2 site-header-inner">
      <div class="d-flex align-items-center gap-4">
        <a class="fw-bold fs-5 site-title text-decoration-none" href="/">WordBox</a>
        <nav class="d-flex gap-3 site-nav">
          <a class="text-muted text-decoration-none small site-nav-link" href="/magazines">マガジン</a>
          <a class="text-muted text-decoration-none small site-nav-link" href="/topics">トピック</a>
          <a class="text-muted text-decoration-none small site-nav-link" href="/dictionary">辞書</a>
        </nav>
      </div>
      <div class="d-flex align-items-center gap-2">
        <form action="/search" method="GET" class="input-group input-group-sm" style="width:220px">
          <input type="text" name="q" placeholder="検索..." class="form-control" aria-label="検索">
          <button type="submit" class="btn btn-outline-secondary" aria-label="検索実行">🔍</button>
        </form>
        <button class="theme-toggle" id="themeToggle" aria-label="テーマ切替">
          <span class="theme-toggle-icon"></span>
        </button>
      </div>
    </div>
  </header>

  <div class="page-wrapper mt-4">
    <main>
      {{content}}
    </main>
    <aside class="sidebar-toc" id="sidebarToc"></aside>
  </div>

  <footer class="border-top mt-5 py-4 text-center text-muted">
    <p class="mb-0">&copy; 2025 WordBox</p>
  </footer>

  <script src="/static/bootstrap.bundle.min.js"></script>
  <script src="/static/main.js"></script>
</body>

</html>
